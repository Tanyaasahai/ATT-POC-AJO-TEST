<body style="font-family: Arial, sans-serif; padding: 50px;">
<h1>AEP Test Use Case</h1>
<p>Enter a UUID to simulate logging in and sending an event to AEP.</p>
<input type="text" id="userInput" placeholder="Enter a UUID">
<button id="sendDataBtn">Send Data to AEP</button>
<script>
       document.getElementById("sendDataBtn").addEventListener("click", function() {
           var collectedName = document.getElementById("userInput").value;
           // Triggering the event to AEP
           alloy("sendEvent", {
               "xdm": {
                   "web": {
                       "webPageDetails": {
                           "name": "Test Home Page"
                       }
                   },
                   "_accenture_partner": {
                       "UUID": collectedName
                   }
               }
           }).then(function(result) {
               console.log("Success! Data sent to AEP Edge Network:", result);
               alert("Event sent to AEP successfully!");
           }).catch(function(error) {
               console.error("Uh oh! Error sending data:", error);
           });
       });
</script>
